<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed_Bridge</title>
  <link rel="stylesheet" href="/css/index.css">     
</head>
<body>
    <header class="body-header">
    <div class="body-header--container">
      <div class="body-header--logo-div">
        <h1 class="body-header--logo">Feed<span>Bridge</span></h1>
        <p>Bridging Surplus Food To Those In Need</p> 
      </div>

      <div class="body-header--login-div">
        <a href="./login.html" class="body-header--login-btn">Login</a>
        <a href="./available-food.html" class="body-header--get-started-btn">Browse Food &#9660;</a>        
      </div>
    </div>

    <div class="header__text-box">
            <h1 class="heading-primary">
                <span class="heading-primary--main">Rescuing Food,</span>
                <span class="heading-primary--sub">Feeding Communities</span>
            </h1>

            <p>Connecting donors with NGOs to reduce food waste using AI.</p>

            <!-- Role Selection Dropdown -->
            <div class="role-selector">
              <button class="btn btn--green btn--animated" id="startNowBtn">Start Now &#9660;</button>      
              <div class="role-dropdown" id="roleDropdown" style="display: none;">
                <a href="./listing.html" class="role-option donor-option">
                  <span class="role-icon">🍱</span>   
                  <div>
                    <strong>I'm a Donor</strong>      
                    <small>Share surplus food</small> 
                  </div>
                </a>
                <a href="./recipient-dashboard.html" class="role-option recipient-option">
                  <span class="role-icon">🙏</span>   
                  <div>
                    <strong>I'm a Recipient</strong>  
                    <small>Claim available food</small>
                  </div>
                </a>
              </div>
            </div>
        </div>
    </div>

  </header>

<script src="/js/config.js"></script>
<script src="/js/index.js"></script>

</body>
</html>
