<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - FeedBridge</title>
  <link rel="stylesheet" href="../feedbridge.css/login.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <h1 class="login-logo">Feed<span>Bridge</span></h1>
      <p class="login-tagline">Welcome Back</p>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <div class="form-group remember">
          <input type="checkbox" id="remember" name="remember">
          <label for="remember">Remember me</label>
        </div>

        <button type="submit" class="btn btn--green">Login</button>
      </form>

      <div class="login-divider">or</div>

      <div class="quick-access">
        <p>Quick Access as:</p>
        <a href="./listing.html" class="quick-btn donor-btn">🍱 Donor</a>
        <a href="./recipient-dashboard.html" class="quick-btn recipient-btn">🙏 Recipient</a>
      </div>

      <p class="signup-link">Don't have an account? <a href="./signup.html">Sign up here</a></p>
    </div>
  </div>

  <script src="../feedbridge.js/login.js"></script>
</body>
</html>
