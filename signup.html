<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - FeedBridge</title>
  <link rel="stylesheet" href="/css/signup.css">
</head>
<body>
  <div class="signup-container">
    <div class="signup-box">
      <h1 class="signup-logo">Feed<span>Bridge</span></h1>
      <p class="signup-tagline">Join Our Community</p>
      <p class="signup-subtitle">Make a difference by sharing food with those in need</p>

      <form id="signupForm" class="signup-form">
        <!-- User Type Selection -->
        <div class="user-type-selection">
          <p class="user-type-label">I am a:</p>
          <div class="user-type-buttons">
            <button type="button" class="user-type-btn" data-type="donor">
              <span class="icon">🍱</span>
              <span>Food Donor</span>
            </button>
            <button type="button" class="user-type-btn" data-type="recipient">
              <span class="icon">🙏</span>
              <span>Community Member</span>
            </button>
          </div>
          <input type="hidden" id="userType" name="userType" required>
        </div>

        <!-- Full Name -->
        <div class="form-group">
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" name="fullname" placeholder="John Doe" required>
          <span class="error-message" id="fullnameError"></span>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required>
          <span class="error-message" id="emailError"></span>
        </div>

        <!-- Phone Number -->
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000">
          <span class="error-message" id="phoneError"></span>
        </div>

        <!-- Location -->
        <div class="form-group">
          <label for="location">City/Location</label>
          <input type="text" id="location" name="location" placeholder="e.g., Lagos, Nigeria" required>
          <span class="error-message" id="locationError"></span>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Min. 8 characters" required>
          <span class="password-strength" id="passwordStrength"></span>
          <span class="error-message" id="passwordError"></span>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" required>
          <span class="error-message" id="confirmPasswordError"></span>
        </div>

        <!-- Terms & Conditions -->
        <div class="form-group checkbox">
          <input type="checkbox" id="terms" name="terms" required>
          <label for="terms">I agree to the <a href="#" class="terms-link">Terms & Conditions</a> and <a href="#" class="terms-link">Privacy Policy</a></label>
          <span class="error-message" id="termsError"></span>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn--green btn--full">Create Account</button>
      </form>

      <!-- Success Message (Hidden by default) -->
      <div class="success-message" id="successMessage" style="display: none;">
        <h2>✅ Account Created Successfully!</h2>
        <p>Welcome to FeedBridge. You can now <a href="./login.html">log in here</a></p>
      </div>

      <!-- Login Link -->
      <p class="login-link">Already have an account? <a href="./login.html">Login here</a></p>
    </div>
  </div>

  <script src="/js/signup.js"></script>
</body>
</html>
